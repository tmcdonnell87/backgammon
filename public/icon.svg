<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#5a3a2a"/>
  <rect x="40" y="40" width="432" height="432" rx="32" fill="#6e3b1f"/>
  <!-- Bar -->
  <rect x="240" y="40" width="32" height="432" fill="#3a2418"/>
  <!-- Two triangles to suggest the board -->
