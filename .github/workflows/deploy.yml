name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backgammon
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      # pnpm blocks esbuild's postinstall by default; approve it so vite can build.
      - name: Approve esbuild build
        run: |
          printf 'allowBuilds:\n  esbuild: true\n' > pnpm-workspace.yaml
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}
      - name: Deploy to web host
        env:
          WEB_HOST: ${{ secrets.WEB_HOST }}
        run: |
          REL="releases/$(date +%Y-%m-%dT%H%M%S)"
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=accept-new" \
            dist/ "$WEB_HOST:/srv/backgammon/$REL/"
          ssh -o StrictHostKeyChecking=accept-new "$WEB_HOST" \
            "ln -sfn /srv/backgammon/$REL /srv/backgammon/current && \
             ls -1dt /srv/backgammon/releases/*/ | tail -n +4 | xargs -r rm -rf"
